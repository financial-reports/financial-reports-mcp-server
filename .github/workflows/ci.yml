name: CI

# Runs on every PR and on every push to `main`. Three jobs:
#
# 1. unit       — fast pytest run with respx-mocked HTTP. Catches logic
#                 regressions in <30s without touching docker.
# 2. eval-fast  — deterministic prompt-registration suite. Asserts every
#                 Prompt registered via @mcp.prompt() surfaces the
#                 expected tool names. No live LLM required.
# 3. e2e        — boots the actual image via docker compose with a real
#                 Redis 7 sidecar and runs `tests/e2e/`. This is the layer
#                 that catches the kind of bug that broke v1.4.37-audit2
#                 in production: OAuth /register failed because the wiring
#                 between FastMCP and `key_value.aio.stores.redis.RedisStore`
#                 doesn't survive contact with a real Redis backend.
#
# All three jobs must pass before merge.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime + test deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Render generated module
        # The runtime module is build-time generated. We render it once so
        # the unit tests can import it; the e2e job redoes this inside the
        # docker build.
        run: python scripts/generate_mcp_tools.py
      - name: Run pytest (unit + decorator + subscription + app routes)
        run: pytest tests/test_*.py -v --tb=short

  eval-fast:
    name: Eval — fast prompt-registration suite
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
      - run: pip install -r requirements.txt -r requirements-test.txt
      - name: Render generated module
        run: python scripts/generate_mcp_tools.py
        env:
          COGNITO_USER_POOL_ID: eu-central-1_CITESTPOOL
          COGNITO_CLIENT_ID: ci_client
          COGNITO_CLIENT_SECRET: ci_secret
      - name: Run deterministic eval suite
        run: pytest tests/eval/ -v
        env:
          COGNITO_USER_POOL_ID: eu-central-1_CITESTPOOL
          COGNITO_CLIENT_ID: ci_client
          COGNITO_CLIENT_SECRET: ci_secret
      - name: Verify docs/token-budget.md is in sync with current generator
        # If a tool description or schema changes without `make audit`, the
        # committed baseline silently goes stale. Fail loudly instead.
        run: |
          python scripts/audit_token_budget.py > /tmp/token-budget.md
          diff -u docs/token-budget.md /tmp/token-budget.md || { \
            echo "::error::docs/token-budget.md is stale — run 'make audit' and commit the result"; \
            exit 1; \
          }
        env:
          COGNITO_USER_POOL_ID: eu-central-1_CITESTPOOL
          COGNITO_CLIENT_ID: ci_client
          COGNITO_CLIENT_SECRET: ci_secret

  e2e:
    name: E2E (docker compose)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install host-side test deps
        # Same file as the unit job. Pytest loads tests/conftest.py for
        # every collection root under tests/ — including tests/e2e/ — so
        # respx must be on the path even though e2e tests don't import it
        # directly. (This is what broke the first CI run.)
        run: pip install -r requirements-test.txt
      - name: Run docker-compose e2e suite (DiskStore + Redis variants)
        run: ./scripts/test-e2e.sh both
      - name: Container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color
