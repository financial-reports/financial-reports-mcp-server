name: CI

# Runs on every PR and on every push to `main`. Two jobs:
#
# 1. unit       — fast pytest run with respx-mocked HTTP. Catches logic
#                 regressions in <30s without touching docker.
# 2. e2e        — boots the actual image via docker compose with a real
#                 Redis 7 sidecar and runs `tests/e2e/`. This is the layer
#                 that catches the kind of bug that broke v1.4.37-audit2
#                 in production: OAuth /register failed because the wiring
#                 between FastMCP and `key_value.aio.stores.redis.RedisStore`
#                 doesn't survive contact with a real Redis backend.
#
# Both jobs must pass before merge.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime + test deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio respx
      - name: Render generated module
        # The runtime module is build-time generated. We render it once so
        # the unit tests can import it; the e2e job redoes this inside the
        # docker build.
        run: python scripts/generate_mcp_tools.py
      - name: Run pytest (unit + decorator + subscription + app routes)
        run: pytest tests/test_*.py -v --tb=short

  e2e:
    name: E2E (docker compose)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install host-side test deps (httpx + pytest)
        run: pip install httpx pytest
      - name: Run docker-compose e2e suite (DiskStore + Redis variants)
        run: ./scripts/test-e2e.sh both
      - name: Container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color
